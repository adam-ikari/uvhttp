name: Performance Tests (HTTPS & WebSocket)

on:
  schedule:
    # 每天凌晨 3 点（UTC）运行，避免与基础性能测试冲突
    - cron: '0 3 * * *'
  workflow_dispatch:  # 允许手动触发
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmark/**'
      - 'CMakeLists.txt'
      - 'cmake/Dependencies.cmake'
  push:
    branches: [ main, develop, pre-release ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmark/**'
      - 'CMakeLists.txt'
      - 'cmake/Dependencies.cmake'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  # HTTPS 性能测试
  https-performance:
    name: HTTPS Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies for mbedtls
        run: |
          pip install jsonschema>=3.2.0

      - name: Build with HTTPS support
        run: |
          echo "========================================"
          echo "  UVHTTP HTTPS 性能测试"
          echo "========================================"
          
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_EXAMPLES=ON \
                -DBUILD_WITH_HTTPS=ON \
                -DBUILD_WITH_WEBSOCKET=OFF \
                ..
          make -j$(nproc)
          
          echo "✓ HTTPS 构建完成"

      - name: Run HTTPS Performance Tests
        run: |
          echo "========================================"
          echo "  启动 HTTPS 性能测试服务器"
          echo "========================================"
          
          cd build
          
          # 创建测试证书
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -keyout certs/key.pem -out certs/cert.pem \
            -days 365 -nodes -subj "/C=US/ST=State/L=City/O=Organization/CN=localhost"
          
          # 检查 HTTPS 服务器是否编译成功
          if [ -f "dist/bin/performance_https_server" ]; then
            echo "✓ HTTPS 性能测试服务器已编译"
          else
            echo "❌ HTTPS 性能测试服务器未找到"
            ls -la dist/bin/ || true
            exit 1
          fi
          
          # 启动 HTTPS 服务器（后台运行）
          ./dist/bin/performance_https_server -p 18443 -c certs/cert.pem -k certs/key.pem &
          HTTPS_PID=$!
          
          echo "HTTPS 服务器 PID: $HTTPS_PID"
          
          # 等待服务器启动
          sleep 3
          
          # 检查服务器是否正常运行
          if kill -0 $HTTPS_PID 2>/dev/null; then
            echo "✓ HTTPS 服务器已启动"
          else
            echo "❌ HTTPS 服务器启动失败"
            exit 1
          fi
          
          # 保存 PID 以便后续清理
          echo $HTTPS_PID > https_server.pid
          
          echo "✓ HTTPS 准备完成"

      - name: Test HTTPS with wrk
        run: |
          echo "========================================"
          echo "  HTTPS wrk 性能测试"
          echo "========================================"
          
          cd build
          
          # 检查是否已安装 wrk
          if ! command -v wrk &> /dev/null; then
            echo "⚠️  wrk 未安装，跳过 wrk 测试"
          else
            echo "wrk 版本: $(wrk --version)"
            
            # 运行 wrk 测试（HTTPS 需要跳过证书验证）
            wrk -t4 -c10 -d10s --timeout 10s --insecure https://127.0.0.1:18443/ || echo "⚠️  wrk 测试失败"
            
            # 测试 API 端点
            wrk -t2 -c5 -d5s --timeout 10s --insecure https://127.0.0.1:18443/api || echo "⚠️  wrk API 测试失败"
          fi

      - name: Test HTTPS with ab
        run: |
          echo "========================================"
          echo "  HTTPS ab 性能测试"
          echo "========================================"
          
          cd build
          
          # 检查是否已安装 ab
          if ! command -v ab &> /dev/null; then
            echo "⚠️  ab 未安装，跳过 ab 测试"
          else
            echo "ab 版本: $(ab -V | head -1)"
            
            # 运行 ab 测试（HTTPS 需要跳过证书验证）
            ab -n 1000 -c 10 -k https://127.0.0.1:18443/ || echo "⚠️  ab 测试失败"
            
            # 测试 API 端点
            ab -n 500 -c 5 -k https://127.0.0.1:18443/api || echo "⚠️  ab API 测试失败"
          fi

      - name: Cleanup HTTPS Server
        if: always()
        run: |
          echo "========================================"
          echo "  清理 HTTPS 服务器"
          echo "========================================"
          
          cd build
          
          if [ -f https_server.pid ]; then
            HTTPS_PID=$(cat https_server.pid)
            if kill -0 $HTTPS_PID 2>/dev/null; then
              echo "停止 HTTPS 服务器 (PID: $HTTPS_PID)"
              kill $HTTPS_PID
              sleep 2
              # 强制清理
              kill -9 $HTTPS_PID 2>/dev/null || true
            fi
            rm https_server.pid
          fi
          
          echo "✓ HTTPS 服务器已停止"

      - name: Upload HTTPS Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: https-performance-results
          path: |
            build/certs/
          retention-days: 7

  # WebSocket 性能测试
  websocket-performance:
    name: WebSocket Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies for mbedtls
        run: |
          pip install jsonschema>=3.2.0

      - name: Build with WebSocket support
        run: |
          echo "========================================"
          echo "  UVHTTP WebSocket 性能测试"
          echo "========================================"
          
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_EXAMPLES=ON \
                -DBUILD_WITH_HTTPS=OFF \
                -DBUILD_WITH_WEBSOCKET=ON \
                ..
          make -j$(nproc)
          
          echo "✓ WebSocket 构建完成"

      - name: Run WebSocket Performance Tests
        run: |
          echo "========================================"
          echo "  启动 WebSocket 性能测试服务器"
          echo "========================================"
          
          cd build
          
          # 检查 WebSocket 服务器是否编译成功
          if [ -f "dist/bin/performance_websocket_server" ]; then
            echo "✓ WebSocket 性能测试服务器已编译"
          else
            echo "❌ WebSocket 性能测试服务器未找到"
            ls -la dist/bin/ || true
            exit 1
          fi
          
          # 启动 WebSocket 服务器（后台运行）
          ./dist/bin/performance_websocket_server -p 18081 &
          WS_PID=$!
          
          echo "WebSocket 服务器 PID: $WS_PID"
          
          # 等待服务器启动
          sleep 3
          
          # 检查服务器是否正常运行
          if kill -0 $WS_PID 2>/dev/null; then
            echo "✓ WebSocket 服务器已启动"
          else
            echo "❌ WebSocket 服务器启动失败"
            exit 1
          fi
          
          # 测试健康检查端点
          curl -s http://127.0.0.1:18081/health || echo "⚠️  健康检查失败"
          
          # 保存 PID 以便后续清理
          echo $WS_PID > ws_server.pid
          
          echo "✓ WebSocket 准备完成"

      - name: Test WebSocket with wscat
        run: |
          echo "========================================"
          echo "  WebSocket 客户端测试"
          echo "========================================"
          
          # 检查 wscat 是否可用
          if ! command -v wscat &> /dev/null; then
            echo "⚠️  wscat 未安装，尝试安装"
            npm install -g wscat
          fi
          
          if command -v wscat &> /dev/null; then
            echo "wscat 版本: $(wscat --version)"
            
            # 测试 WebSocket 连接和 echo
            echo "测试 WebSocket echo..."
            echo "Hello WebSocket" | timeout 5 wscat -c "ws://127.0.0.1:18081/ws" || echo "⚠️  WebSocket 测试失败"
            
            # 测试多条消息
            echo "测试多条消息..."
            for i in {1..10}; do
              echo "Message $i" | timeout 2 wscat -c "ws://127.0.0.1:18081/ws" || true
            done
          else
            echo "⚠️  wscat 不可用，跳过 WebSocket 客户端测试"
          fi

      - name: Cleanup WebSocket Server
        if: always()
        run: |
          echo "========================================"
          echo "  清理 WebSocket 服务器"
          echo "========================================"
          
          cd build
          
          if [ -f ws_server.pid ]; then
            WS_PID=$(cat ws_server.pid)
            if kill -0 $WS_PID 2>/dev/null; then
              echo "停止 WebSocket 服务器 (PID: $WS_PID)"
              kill $WS_PID
              sleep 2
              # 强制清理
              kill -9 $WS_PID 2>/dev/null || true
            fi
            rm ws_server.pid
          fi
          
          echo "✓ WebSocket 服务器已停止"

      - name: Upload WebSocket Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: websocket-performance-results
          path: |
            build/dist/bin/
          retention-days: 7

