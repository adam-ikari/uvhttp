name: CI/CD - Deploy Documentation

# 触发条件：Push 到 main 或 release/* 分支，且 docs/** 或 Doxyfile 路径有变化
on:
  push:
    branches: [ main, 'release/**' ]
    paths:
      - 'docs/**'
      - 'Doxyfile'
      - 'scripts/convert_xml_to_markdown.js'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          submodules: recursive
      
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'
      
      - name: Generate all documentation
        run: |
          # Create necessary directories
          mkdir -p docs/api/html docs/api/latex docs/api/xml docs/api/.doxygen
          
          # Generate Doxygen API documentation
          doxygen Doxyfile
          
          # Build VitePress documentation site
          cd docs
          npm install
          DEPLOY=gh-pages npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment summary
        run: |
          echo "## 📚 Documentation Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.deployment.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://adam-ikari.github.io/uvhttp/" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Documentation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API XML: docs/api/xml/" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API Markdown: docs/api/markdown_from_xml/" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ VitePress Site: docs/.vitepress/dist/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^(docs/|Doxyfile|scripts/)' || echo "No docs changes detected" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY