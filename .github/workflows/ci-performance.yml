name: CI/CD - Performance Tests

on:
  schedule:
    # 每天凌晨 2 点（UTC）运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmark/**'
      - 'CMakeLists.txt'
  push:
    branches: [ main, develop, pre-release ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmark/**'
      - 'CMakeLists.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  performance-benchmark:
    name: Performance Benchmark Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build and Verify
        run: |
          echo "========================================"
          echo "  UVHTTP 编译验证测试"
          echo "========================================"
          echo ""

          docker run --rm --privileged \
            --cpuset-cpus=0-3 \
            --memory=2g \
            --memory-swap=2g \
            --network=host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c "
              set -e
              
              echo '=== 安装依赖 ==='
              apt-get update -qq
              apt-get install -y -qq \
                build-essential \
                cmake \
                git \
                linux-tools-common
              
              echo '=== 初始化子模块 ==='
              git config --global --add safe.directory /workspace
              git config --global --add safe.directory '*'
              git submodule update --init --recursive
              
              echo '=== 编译项目 ==='
              mkdir -p build
              cd build
              
              # 编译基准测试工具
              cmake -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_FLAGS="-Wno-format-truncation" \
                    -DCMAKE_CXX_FLAGS="-Wno-format-truncation" \
                    -DBUILD_WITH_HTTPS=OFF \
                    -DBUILD_WITH_WEBSOCKET=OFF ..
              
              make -j\$(nproc) benchmark_unified
              
              echo '=== 编译成功 ==='
              echo '✅ benchmark_unified 编译成功'
              echo '📦 文件大小:'
              ls -lh dist/bin/benchmark_unified
              echo ''
              echo '说明: 运行时性能测试请在本地执行'
              echo '命令: ./build/dist/bin/benchmark_unified <port>'
            "

  database-simulation:
    name: Database Query Simulation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Verify
        run: |
          docker run --rm --privileged \
            --cpuset-cpus=0-3 \
            --memory=2g \
            --network=host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c "
              apt-get update -qq && apt-get install -y -qq build-essential cmake git
              
              git config --global --add safe.directory /workspace
              git config --global --add safe.directory '*'
              git submodule update --init --recursive || true
              
              mkdir -p build && cd build
              cmake -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_FLAGS="-Wno-format-truncation" \
                    -DCMAKE_CXX_FLAGS="-Wno-format-truncation" \
                    -DBUILD_WITH_TLS=OFF ..
              
              make -j\$(nproc) benchmark_database_simulation
              
              echo '✅ benchmark_database_simulation 编译成功'
            "

  file-upload-test:
    name: File Upload Performance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Verify
        run: |
          docker run --rm --privileged \
            --cpuset-cpus=0-3 \
            --memory=2g \
            --network=host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c "
              apt-get update -qq && apt-get install -y -qq build-essential cmake git
              
              git config --global --add safe.directory /workspace
              git config --global --add safe.directory '*'
              git submodule update --init --recursive || true
              
              mkdir -p build && cd build
              cmake -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_FLAGS="-Wno-format-truncation" \
                    -DCMAKE_CXX_FLAGS="-Wno-format-truncation" \
                    -DBUILD_WITH_TLS=OFF ..
              
              make -j\$(nproc) benchmark_file_upload
              
              echo '✅ benchmark_file_upload 编译成功'
            "