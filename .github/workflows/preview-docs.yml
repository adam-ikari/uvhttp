name: CI/CD - Preview Documentation

# 触发条件：Pull Request 且 docs/** 或 Doxyfile 路径有变化
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'Doxyfile'
      - 'scripts/convert_xml_to_markdown.js'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  build-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          submodules: recursive
      
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'
      
      - name: Generate documentation
        run: |
          # Create necessary directories
          mkdir -p docs/api/html docs/api/latex docs/api/xml docs/api/.doxygen
          
          # Generate Doxygen API documentation
          doxygen Doxyfile
          
          # Build VitePress documentation site
          cd docs
          npm install
          npm run build
      
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-preview-${{ github.sha }}
          path: docs/.vitepress/dist
          retention-days: 7
      
      - name: Generate preview URL
        id: preview-url
        run: |
          # Generate preview URL using GitHub Pages preview service
          PREVIEW_URL="https://github-preview.dev/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
      
      - name: Add preview comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview-url.outputs.preview_url }}';
            const downloadUrl = `${{ steps.preview-url.outputs.preview_url }}/index.html`;
            const comment = `## 📚 Documentation Preview Available
            
            Your documentation changes have been built successfully! 
            
            ### 🔗 Preview Links
            - **Download Preview**: [⬇️ Download Preview Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Preview Site**: ${previewUrl}
            
            ### 📊 Build Information
            - **Branch**: ${context.ref}
            - **Commit**: ${context.sha}
            - **Workflow Run**: #${{ github.run_number }}
            
            ### 📥 How to View
            1. Click "Download Preview Artifact" above
            2. Extract the downloaded ZIP file
            3. Open \`index.html\` in your browser
            
            The preview artifact will be available for 7 days.
            
            *Note: This is a downloadable preview, not a hosted site. For a hosted preview, consider using services like Netlify Drop or Vercel.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });