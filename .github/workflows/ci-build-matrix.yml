name: CI/CD - Build Matrix Validation

# 触发条件：PR 打开、同步、重新打开到 main 或 develop 分支
on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main, develop, pre-release ]
  workflow_dispatch:

# 并发控制：取消同一 PR 的旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ========== 编译选项矩阵验证 ==========
  
  build-matrix:
    name: "Build: ${{ matrix.config.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config:
          # 基础配置（最小依赖）
          - name: "Minimal (no optional features)"
            websocket: OFF
            mimalloc: OFF
            https: OFF
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "Minimal build with no optional features"
          
          # 全功能配置
          - name: "Full Features"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "Full build with all optional features"
          
          # WebSocket 单独测试
          - name: "WebSocket Only"
            websocket: ON
            mimalloc: OFF
            https: OFF
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "WebSocket support only"
          
          # HTTPS 单独测试
          - name: "HTTPS Only"
            websocket: OFF
            mimalloc: OFF
            https: ON
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "HTTPS support only"
          
          # mimalloc 单独测试
          - name: "mimalloc Only"
            websocket: OFF
            mimalloc: ON
            https: OFF
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "mimalloc allocator only"
          
          # Debug 模式
          - name: "Debug Mode"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: ON
            coverage: OFF
            examples: OFF
            description: "Debug build with -O0"
          
          # Coverage 模式
          - name: "Coverage Mode"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: OFF
            coverage: ON
            examples: OFF
            description: "Coverage build with gcov"
          
          # 组合 1: WebSocket + HTTPS
          - name: "WebSocket + HTTPS"
            websocket: ON
            mimalloc: OFF
            https: ON
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "WebSocket and HTTPS support"
          
          # 组合 2: WebSocket + mimalloc
          - name: "WebSocket + mimalloc"
            websocket: ON
            mimalloc: ON
            https: OFF
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "WebSocket and mimalloc"
          
          # 组合 3: HTTPS + mimalloc
          - name: "HTTPS + mimalloc"
            websocket: OFF
            mimalloc: ON
            https: ON
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "HTTPS and mimalloc"
          
          # 组合 4: WebSocket + HTTPS + mimalloc
          - name: "WebSocket + HTTPS + mimalloc"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: OFF
            coverage: OFF
            examples: OFF
            description: "All features except debug/coverage"
          
          # 组合 5: Debug + Coverage
          - name: "Debug + Coverage"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: ON
            coverage: ON
            examples: OFF
            description: "Debug and coverage together"
          
          # 组合 6: Minimal + Debug
          - name: "Minimal + Debug"
            websocket: OFF
            mimalloc: OFF
            https: OFF
            debug: ON
            coverage: OFF
            examples: OFF
            description: "Minimal build in debug mode"
          
          # 组合 7: Full + Examples
          - name: "Full + Examples"
            websocket: ON
            mimalloc: ON
            https: ON
            debug: OFF
            coverage: OFF
            examples: ON
            description: "Full build with examples"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          submodules: recursive
      
      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          os: ubuntu-latest
      
      - name: Configure CMake
        run: |
          BUILD_TYPE="${{ matrix.config.debug == 'ON' && 'Debug' || 'Release' }}"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_FLAGS="-Wno-format-truncation" \
            -DCMAKE_CXX_FLAGS="-Wno-format-truncation" \
            -DBUILD_WITH_WEBSOCKET=${{ matrix.config.websocket }} \
            -DBUILD_WITH_MIMALLOC=${{ matrix.config.mimalloc }} \
            -DBUILD_WITH_HTTPS=${{ matrix.config.https }} \
            -DENABLE_DEBUG=${{ matrix.config.debug }} \
            -DENABLE_COVERAGE=${{ matrix.config.coverage }} \
            -DBUILD_EXAMPLES=${{ matrix.config.examples }}
      
      - name: Build project
        run: |
          BUILD_TYPE="${{ matrix.config.debug == 'ON' && 'Debug' || 'Release' }}"
          cmake --build build --config $BUILD_TYPE -j$(nproc)
      
      - name: Check for warnings
        run: |
          BUILD_TYPE="${{ matrix.config.debug == 'ON' && 'Debug' || 'Release' }}"
          if cmake --build build --config $BUILD_TYPE 2>&1 | grep -i "warning:"; then
            echo "Found compiler warnings!"
            exit 1
          fi
      
      - name: Run tests (if not examples only)
        if: matrix.config.examples == 'OFF'
        run: |
          cd build
          ctest --output-on-failure --timeout 60 -j$(nproc) || {
            EXIT_CODE=$?
            # Exit code 8 means tests were skipped (expected when features are disabled)
            # Exit code 0 means all tests passed
            # Exit codes 1-7 mean actual test failures
            if [ $EXIT_CODE -eq 8 ]; then
              echo "Some tests were skipped (expected when optional features are disabled)"
              exit 0
            else
              echo "Tests failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }
      
      - name: Generate coverage report (if coverage enabled)
        if: matrix.config.coverage == 'ON'
        run: |
          cd build
          # Find all .gcno files
          find . -name "*.gcno" -type f || echo "No .gcno files found"
          # Find all .gcda files
          find . -name "*.gcda" -type f || echo "No .gcda files found"
          # Generate coverage report
          lcov --capture --directory . --output-file coverage.info --base-directory .. || true
          lcov --remove coverage.info '/usr/*' --output-file coverage.info || true
          lcov --remove coverage.info '*/deps/*' --output-file coverage.info || true
          lcov --remove coverage.info '*/test/*' --output-file coverage.info || true
          lcov --list coverage.info || echo "No coverage data generated"
      
      - name: Upload coverage reports (if coverage enabled)
        if: matrix.config.coverage == 'ON'
        uses: codecov/codecov-action@v4
        with:
          files: ./build/coverage.info
          flags: ${{ matrix.config.name }}
          name: ${{ matrix.config.name }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.1
        with:
          name: build-${{ matrix.config.name }}-${{ github.event.pull_request.number || github.sha }}
          path: build/dist/
          retention-days: 7
      
      - name: Upload test logs
        if: always() && matrix.config.examples == 'OFF'
        uses: actions/upload-artifact@v4.3.1
        with:
          name: test-logs-${{ matrix.config.name }}-${{ github.event.pull_request.number || github.sha }}
          path: build/Testing/
          retention-days: 7


  # ========== 生成总结 ==========
  
  generate-summary:
    needs: [build-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Build Matrix Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Minimal (no optional features) | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Features | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebSocket Only | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTPS Only | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mimalloc Only | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug Mode | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Mode | ${{ needs.build-matrix.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Configurations Validated" >> $GITHUB_STEP_SUMMARY
          echo "- Build Matrix: 14 configurations" >> $GITHUB_STEP_SUMMARY
          echo "- Static Analysis: 3 tools (skipped - not configured)" >> $GITHUB_STEP_SUMMARY
          echo "**Total: 14 validation jobs**" >> $GITHUB_STEP_SUMMARY